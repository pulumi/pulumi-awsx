[env]
GH_AW_VERSION = "0.53.1"

[tools]
golangci-lint = "2.7.0"

[tools."github:github/gh-aw"]
version = "0.53.1"
bin = "gh-aw"

[tasks.aw-version]
description = "Show pinned gh-aw version"
run = "gh-aw version"

[tasks.aw-validate]
description = "Validate agentic workflows without emitting lock files"
run = "gh-aw validate"

[tasks.aw-compile]
description = "Compile all agentic workflows"
run = "gh-aw compile"
