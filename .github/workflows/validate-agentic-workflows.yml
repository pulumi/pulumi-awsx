name: Validate Agentic Workflows

on:
  pull_request:
    paths:
      - '.github/workflows/*.md'
      - '.github/workflows/*.lock.yml'
      - '.github/aw/actions-lock.json'
      - '.gitattributes'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install or upgrade gh-aw
        run: |
          set -euo pipefail
          if gh aw version >/dev/null 2>&1; then
            gh extension upgrade aw
          else
            curl -sL https://raw.githubusercontent.com/github/gh-aw/main/install-gh-aw.sh | bash
          fi
          gh aw version

      - name: Validate and compile gh-aw workflows
        run: |
          set -euo pipefail
          gh aw compile --validate \
            .github/workflows/gh-aw-pr-review.md \
            .github/workflows/gh-aw-pr-rereview.md

      - name: Ensure compiled lock file is up to date
        run: |
          git diff --exit-code -- \
            .github/workflows/gh-aw-pr-review.lock.yml \
            .github/workflows/gh-aw-pr-rereview.lock.yml \
            .github/aw/actions-lock.json
